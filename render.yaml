services:
  - type: web
    name: library-api
    env: java
    plan: free
    branch: main
    buildCommand: ./mvn clean install -DskipTests    # ou mvn clean install
    startCommand: java -jar build/libs/nada-0.0.1-SNAPSHOT.jar # ajuste para o nome do seu .jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
